<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ライフメイクセールス｜Life Make Sales</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800;900&display=swap" />
  <link rel="stylesheet" href="/static/style.css?v=16" />
</head>
<body>
  <!-- ログイン(認証有効時のみ表示) -->
  <div id="login-overlay" class="modal-overlay hidden">
    <div class="modal" id="login-box" style="max-width:380px">
      <div class="modal-head"><h2 id="login-title">🔒 ログイン</h2></div>
      <div class="modal-body" id="login-view">
        <div class="field"><label>ユーザー名</label><input id="login-user" type="text" autocomplete="username" placeholder="admin"></div>
        <div class="field"><label>パスワード</label><input id="login-pw" type="password" autocomplete="current-password"></div>
        <div class="form-actions"><button class="btn" id="login-btn" style="width:100%">ログイン</button></div>
        <div id="login-msg" class="voice-hint" style="color:#b91c1c"></div>
        <div id="to-signup-wrap" class="hidden" style="text-align:center;margin-top:12px;font-size:13px">
          アカウントをお持ちでない方は <a href="#" id="show-signup" style="color:#4338ca;font-weight:600">新規登録</a>
        </div>
      </div>
      <div class="modal-body hidden" id="signup-view">
        <div class="field"><label>ユーザー名（ログインID）*</label><input id="su-user" type="text" placeholder="例）tanaka"></div>
        <div class="field"><label>表示名</label><input id="su-name" type="text" placeholder="例）田中 健"></div>
        <div class="field"><label>パスワード（4文字以上）*</label><input id="su-pw" type="password"></div>
        <div class="field"><label>登録コード *</label><input id="su-code" type="text" placeholder="管理者から共有されたコード"></div>
        <div class="form-actions"><button class="btn" id="su-btn" style="width:100%">登録して開始</button></div>
        <div id="su-msg" class="voice-hint" style="color:#b91c1c"></div>
        <div style="text-align:center;margin-top:12px;font-size:13px"><a href="#" id="show-login" style="color:#4338ca;font-weight:600">ログインに戻る</a></div>
      </div>
    </div>
  </div>

  <div id="app">
    <!-- サイドバー -->
    <aside class="sidebar">
      <div class="brand">
        <span class="logo">◆</span>
        <span class="brand-name">Life Make Sales<small>ライフメイクセールス</small></span>
      </div>
      <nav class="nav">
        <div class="nav-label">ホーム</div>
        <button class="nav-item active" data-view="dashboard"><span class="ico">📊</span> ダッシュボード</button>
        <div class="nav-label">営業活動</div>
        <button class="nav-item" data-view="tasks"><span class="ico">✅</span> タスク抽出</button>
        <button class="nav-item" data-view="pipeline"><span class="ico">📈</span> 商談フロー</button>
        <button class="nav-item" data-view="happiness"><span class="ico">🌟</span> 幸せ意識度チェック</button>
        <button class="nav-item" data-view="karte"><span class="ico">📋</span> ライフメイクカルテ</button>
        <button class="nav-item" data-view="hearing"><span class="ico">🎤</span> 人生相談カルテ</button>
        <button class="nav-item" data-view="meetings"><span class="ico">📅</span> 面談管理</button>
        <button class="nav-item" data-view="minutes"><span class="ico">🎙️</span> AI議事録</button>
        <div class="nav-label">管理・育成</div>
        <button class="nav-item" data-view="crm"><span class="ico">🏢</span> CRM（顧客）</button>
        <button class="nav-item" data-view="training"><span class="ico">🎓</span> クローザー育成</button>
        <div class="nav-label">ヘルプ</div>
        <button class="nav-item" data-view="guide"><span class="ico">📖</span> 使い方（チュートリアル）</button>
      </nav>
      <div class="sidebar-foot" id="sidebar-foot"><b>Life Make Sales</b><br><span id="logout-link"></span></div>
    </aside>
    <div id="nav-overlay" class="nav-overlay"></div>

    <!-- メイン -->
    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button id="hamburger" class="hamburger" aria-label="メニュー">☰</button>
          <h1 id="view-title">ダッシュボード</h1>
        </div>
        <div class="topbar-brand">
          <div class="tb-en">LIFE MAKE PARTNERS</div>
          <img class="tb-logo" src="/static/lmp-logo.png?v=1" alt="LMP ライフメイクパートナーズ" />
          <div class="tb-ja">ライフメイクパートナーズ</div>
        </div>
        <div class="topbar-actions" id="topbar-actions"></div>
      </header>
      <div id="view" class="view"></div>
    </main>
  </div>

  <!-- モーダル -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" id="modal-box">
      <div class="modal-head">
        <h2 id="modal-title">タイトル</h2>
        <button id="modal-close" class="icon-btn">✕</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="/static/app.js?v=14"></script>
</body>
</html>
