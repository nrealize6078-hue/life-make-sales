<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ライフメイクセールス｜Life Make Sales</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800;900&display=swap" />
  <link rel="stylesheet" href="/static/style.css?v=14" />
</head>
<body>
  <!-- ログイン(認証有効時のみ表示) -->
  <div id="login-overlay" class="modal-overlay hidden">
    <div class="modal" id="login-box" style="max-width:360px">
      <div class="modal-head"><h2>🔒 ログイン</h2></div>
      <div class="modal-body">
        <div class="field"><label>ユーザー名</label><input id="login-user" type="text" autocomplete="username" placeholder="admin"></div>
        <div class="field"><label>パスワード</label><input id="login-pw" type="password" autocomplete="current-password"></div>
        <div class="form-actions"><button class="btn" id="login-btn" style="width:100%">ログイン</button></div>
        <div id="login-msg" class="voice-hint" style="color:#b91c1c"></div>
      </div>
    </div>
  </div>

  <div id="app">
    <!-- サイドバー -->
    <aside class="sidebar">
      <div class="brand">
        <span class="logo">◆</span>
        <span class="brand-name">Life Make Sales<small>ライフメイクセールス</small></span>
      </div>
      <nav class="nav">
        <div class="nav-label">ホーム</div>
        <button class="nav-item active" data-view="dashboard"><span class="ico">📊</span> ダッシュボード</button>
        <div class="nav-label">営業活動</div>
        <button class="nav-item" data-view="tasks"><span class="ico">✅</span> タスク抽出</button>
        <button class="nav-item" data-view="pipeline"><span class="ico">📈</span> 商談フロー</button>
        <button class="nav-item" data-view="happiness"><span class="ico">🌟</span> 幸せ意識度チェック</button>
        <button class="nav-item" data-view="karte"><span class="ico">📋</span> ライフメイクカルテ</button>
        <button class="nav-item" data-view="hearing"><span class="ico">🎤</span> 人生相談カルテ</button>
        <button class="nav-item" data-view="meetings"><span class="ico">📅</span> 面談管理</button>
        <button class="nav-item" data-view="minutes"><span class="ico">🎙️</span> AI議事録</button>
        <div class="nav-label">管理・育成</div>
        <button class="nav-item" data-view="crm"><span class="ico">🏢</span> CRM（顧客）</button>
        <button class="nav-item" data-view="training"><span class="ico">🎓</span> クローザー育成</button>
      </nav>
      <div class="sidebar-foot" id="sidebar-foot"><b>Life Make Sales</b><br><span id="logout-link"></span></div>
    </aside>
    <div id="nav-overlay" class="nav-overlay"></div>

    <!-- メイン -->
    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button id="hamburger" class="hamburger" aria-label="メニュー">☰</button>
          <h1 id="view-title">ダッシュボード</h1>
        </div>
        <div class="topbar-brand">
          <div class="tb-en">LIFE MAKE PARTNERS</div>
          <div class="tb-ja">ライフメイクパートナーズ</div>
        </div>
        <div class="topbar-actions" id="topbar-actions"></div>
      </header>
      <div id="view" class="view"></div>
    </main>
  </div>

  <!-- モーダル -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" id="modal-box">
      <div class="modal-head">
        <h2 id="modal-title">タイトル</h2>
        <button id="modal-close" class="icon-btn">✕</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="/static/app.js?v=13"></script>
</body>
</html>
