<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LMP本部コンソール</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
         background: #f5f7fb; color: #1f2d45; padding: clamp(16px, 4vw, 40px); }
  .wrap { max-width: 1100px; margin: 0 auto; }
  h1 { font-size: clamp(20px, 3vw, 28px); color: #0e2245; letter-spacing: .02em; }
  .sub { color: #5b6b82; font-size: 13.5px; margin-top: 4px; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin: 22px 0; }
  .card { background: #fff; border: 1px solid rgba(14,34,69,.08); border-radius: 14px; padding: 18px 20px;
          box-shadow: 0 10px 26px -20px rgba(14,34,69,.4); }
  .card .n { font-size: 30px; font-weight: 700; color: #0e2245; }
  .card .l { font-size: 12.5px; color: #5b6b82; margin-top: 3px; }
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 14px; overflow: hidden;
          box-shadow: 0 10px 26px -20px rgba(14,34,69,.4); }
  th, td { text-align: left; padding: 12px 14px; font-size: 13.5px; border-bottom: 1px solid rgba(14,34,69,.06); }
  th { background: #0e2245; color: #fff; font-weight: 600; letter-spacing: .02em; }
  tr:last-child td { border-bottom: 0; }
  .muted { color: #8493a8; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 999px; background: #eef2fb; color: #2e5be6; }
  .warn { background: #2a1215; color: #ff8a80; padding: 14px 16px; border-radius: 10px; font-size: 13.5px; line-height: 1.7; }
  .members { font-size: 12.5px; color: #5b6b82; }
  .members div { padding: 2px 0; }
  .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  button { font-family: inherit; font-size: 13px; padding: 9px 16px; border-radius: 10px; border: 0; cursor: pointer;
           background: #0e2245; color: #fff; }
  button.ghost { background: #eef2fb; color: #0e2245; }
  a.back { color: #2e5be6; text-decoration: none; font-size: 13px; }
  .panel { background:#fff; border:1px solid rgba(14,34,69,.08); border-radius:14px; padding:20px 22px; margin:22px 0;
           box-shadow:0 10px 26px -20px rgba(14,34,69,.4); }
  .panel h2 { font-size:16px; color:#0e2245; margin-bottom:14px; }
  .form { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:12px; align-items:end; }
  .field label { display:block; font-size:12px; color:#5b6b82; margin-bottom:5px; }
  .field input, .field select { width:100%; padding:10px 12px; border:1px solid rgba(14,34,69,.16);
           border-radius:10px; font-family:inherit; font-size:14px; }
  .hint { font-size:11.5px; color:#8493a8; margin-top:6px; }
  #addResult { margin-top:12px; font-size:13px; }
  .success { background:#e9f9ee; color:#1f7a4d; padding:10px 14px; border-radius:10px; }
  details.pw { grid-column:1/-1; font-size:12.5px; color:#5b6b82; }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div>
      <h1>LMP本部コンソール</h1>
      <div class="sub">全加盟店の利用状況（読み取り専用・第1版）</div>
    </div>
    <div>
      <a class="back" href="/">← SALESへ戻る</a>
      <button class="ghost" onclick="load()">更新</button>
    </div>
  </div>

  <div id="status"></div>
  <div class="cards" id="cards"></div>

  <div class="panel" id="hqModePanel" style="display:none">
    <h2>本部モード（加盟店の画面をサポートで見る）</h2>
    <div class="form">
      <div class="field" style="grid-column:span 2"><label>あなたの本部ログイン用メール（会計アプリのログインに使うアドレス）</label>
        <input id="hqEmail" placeholder="n.realize6078@gmail.com"></div>
      <div class="field"><label>&nbsp;</label><button class="ghost" onclick="promoteHq()">このメールを本部にする</button></div>
    </div>
    <div id="actingStatus" class="hint" style="margin-top:12px"></div>
  </div>

  <div class="panel" id="addPanel" style="display:none">
    <h2>加盟店を追加</h2>
    <div class="form">
      <div class="field"><label>会社名 *</label><input id="f_name" placeholder="富士リアルティ株式会社"></div>
      <div class="field"><label>担当者メール *</label><input id="f_email" placeholder="fj@fuji-realty.com"></div>
      <div class="field"><label>RC会員ID</label><input id="f_rc" placeholder="LMP-0001"></div>
      <div class="field"><label>権限</label>
        <select id="f_role"><option value="admin">admin（管理者）</option><option value="accountant">accountant（会計担当）</option><option value="viewer">viewer（閲覧のみ）</option></select>
      </div>
      <div class="field"><label>パスワードの渡し方</label>
        <select id="f_mode"><option value="invite">招待メールを送る（本人が設定）</option><option value="password">その場で発行する</option></select>
      </div>
      <div class="field"><label>&nbsp;</label><button onclick="addCompany()">追加する</button></div>
      <details class="pw" id="pwWrap" style="display:none"><summary>発行するパスワード（8文字以上）</summary>
        <input id="f_pw" placeholder="自動生成する場合は空欄" style="margin-top:8px;max-width:280px"></details>
    </div>
    <div class="hint">「招待メール」はSupabaseのメール送信設定が必要です。届かない場合は「その場で発行」をご利用ください。</div>
    <div id="addResult"></div>
  </div>

  <div id="body"></div>
</div>

<script>
function esc(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(s){ if(!s) return '—'; try { return new Date(s).toLocaleString('ja-JP', {year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}); } catch(e){ return s; } }

async function load(){
  var body = document.getElementById('body');
  var cards = document.getElementById('cards');
  var status = document.getElementById('status');
  body.innerHTML = '<p class="muted">読み込み中…</p>'; cards.innerHTML=''; status.innerHTML='';

  // 設定チェック
  try {
    var st = await fetch('/api/hq/status', {credentials:'include'}).then(r=>r.json());
    if (!st.configured) {
      status.innerHTML = '<div class="warn">Supabaseが未設定です。VPSの <code>/opt/life-make-sales/.env</code> に '
        + '<code>SUPABASE_URL</code> と <code>SUPABASE_SERVICE_ROLE_KEY</code> を設定し、<code>systemctl restart lms</code> してください。</div>';
      body.innerHTML=''; return;
    }
  } catch(e) {
    status.innerHTML = '<div class="warn">権限がありません。本部(hq)アカウントでログインしてください。</div>';
    body.innerHTML=''; return;
  }

  try {
    var d = await fetch('/api/hq/overview', {credentials:'include'}).then(async r=>{
      if(!r.ok) throw new Error((await r.json().catch(()=>({}))).detail || r.status);
      return r.json();
    });

    cards.innerHTML =
      card(d.tenant_count, '加盟企業') +
      card(d.user_count, '利用者') +
      card(d.auth_user_count, '認証済みユーザー') +
      card(d.hq_count, '本部ユーザー');

    document.getElementById('addPanel').style.display = '';
    document.getElementById('hqModePanel').style.display = '';
    refreshActing();

    if (!d.tenants.length) { body.innerHTML = '<p class="muted">加盟店がまだありません。</p>'; return; }

    var rows = d.tenants.map(function(t){
      var members = t.members.map(function(m){
        var conf = m.confirmed ? '' : ' <span class="badge">未確認</span>';
        return '<div>'+esc(m.email||'—')+' <span class="muted">('+esc(m.role)+')</span>'+conf+'</div>';
      }).join('');
      return '<tr>'
        + '<td><strong>'+esc(t.name)+'</strong><div class="muted" style="font-size:11.5px">'+esc(t.rc_member_id||'RC会員ID未設定')+'</div></td>'
        + '<td>'+t.member_count+'</td>'
        + '<td>'+fmtDate(t.last_login)+'</td>'
        + '<td class="members">'+(members||'<span class="muted">—</span>')+'</td>'
        + '<td><button class="ghost" onclick="actAs(\''+t.tenant_id+'\',\''+esc(t.name).replace(/\'/g,"\\'")+'\')">この会社を見る</button></td>'
        + '</tr>';
    }).join('');

    body.innerHTML = '<table><thead><tr><th>加盟企業</th><th>人数</th><th>最終ログイン</th><th>メンバー</th><th>サポート</th></tr></thead><tbody>'+rows+'</tbody></table>';
  } catch(e) {
    body.innerHTML = '<div class="warn">読み込みに失敗しました：'+esc(e.message)+'</div>';
  }
}
function card(n, l){ return '<div class="card"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>'; }

// パスワード方式の切替でパスワード欄を出す
document.getElementById('f_mode').addEventListener('change', function(){
  document.getElementById('pwWrap').style.display = this.value==='password' ? '' : 'none';
});

// 本部メールを localStorage に保持
var hqEmailInput = document.getElementById('hqEmail');
try { hqEmailInput.value = localStorage.getItem('lmp_hq_email') || ''; } catch(e){}
hqEmailInput.addEventListener('change', function(){ try{ localStorage.setItem('lmp_hq_email', this.value.trim()); }catch(e){} refreshActing(); });

function hqEmail(){ return (document.getElementById('hqEmail').value||'').trim().toLowerCase(); }

async function promoteHq(){
  var email = hqEmail();
  var s = document.getElementById('actingStatus');
  if (email.indexOf('@')<0){ s.innerHTML='<span class="warn">本部にするメールアドレスを入力してください。</span>'; return; }
  try{ localStorage.setItem('lmp_hq_email', email); }catch(e){}
  s.textContent = '設定中…';
  try {
    await fetch('/api/hq/promote', {method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email:email, is_hq:true})}).then(async r=>{ if(!r.ok) throw new Error((await r.json().catch(()=>({}))).detail||r.status); });
    refreshActing();
  } catch(e){ s.innerHTML='<span class="warn">失敗：'+esc(e.message)+'</span>'; }
}

async function refreshActing(){
  var s = document.getElementById('actingStatus');
  var email = hqEmail();
  if (!email){ s.innerHTML='<span class="muted">本部メールを入力すると、加盟店のサポート閲覧が使えます。</span>'; return; }
  try {
    var d = await fetch('/api/hq/acting?email='+encodeURIComponent(email), {credentials:'include'}).then(r=>r.json());
    if (!d.found){ s.innerHTML='<span class="muted">'+esc(email)+' はまだSupabaseにいません。「このメールを本部にする」を押す前に、加盟店/ユーザーとして登録が必要です。</span>'; return; }
    if (!d.is_hq){ s.innerHTML='<span class="muted">'+esc(email)+' は本部ではありません。「このメールを本部にする」を押してください。</span>'; return; }
    if (d.acting_tenant_id){
      s.innerHTML = '🔎 現在 <strong>'+esc(d.acting_name||'ある加盟店')+'</strong> を閲覧中です。'
        + ' <button class="ghost" onclick="actAs(null)">解除して本部に戻る</button>'
        + '<div class="muted" style="margin-top:6px">会計アプリ（例: <a href="https://kaikei.lifemakepartners.net" target="_blank">kaikei.lifemakepartners.net</a>）を開くと、この会社の画面が見えます。</div>';
    } else {
      s.innerHTML = '✅ 本部モード（自分）です。下の「この会社を見る」で加盟店に切り替えられます。';
    }
  } catch(e){ s.innerHTML='<span class="warn">状態取得に失敗：'+esc(e.message)+'</span>'; }
}

async function actAs(tenantId, name){
  var email = hqEmail();
  var s = document.getElementById('actingStatus');
  if (!email){ alert('先に「本部ログイン用メール」を入力してください。'); return; }
  s.textContent = '切替中…';
  try {
    await fetch('/api/hq/act', {method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email:email, tenant_id:tenantId})}).then(async r=>{ if(!r.ok) throw new Error((await r.json().catch(()=>({}))).detail||r.status); });
    refreshActing();
    if (tenantId) {
      s.innerHTML = '🔎 <strong>'+esc(name)+'</strong> に切り替えました。会計アプリを新しいタブで開いています…'
        + '<div class="muted" style="margin-top:6px">⚠️ 反映には一度ログインし直し（トークン更新）が必要な場合があります。</div>';
      window.open('https://kaikei.lifemakepartners.net', '_blank');
    }
  } catch(e){ s.innerHTML='<span class="warn">切替に失敗：'+esc(e.message)+'</span>'; }
}

async function addCompany(){
  var name = document.getElementById('f_name').value.trim();
  var email = document.getElementById('f_email').value.trim();
  var rc = document.getElementById('f_rc').value.trim();
  var role = document.getElementById('f_role').value;
  var mode = document.getElementById('f_mode').value;
  var pw = document.getElementById('f_pw').value;
  var out = document.getElementById('addResult');
  if (!name || email.indexOf('@')<0){ out.innerHTML='<div class="warn">会社名とメールアドレスを入力してください。</div>'; return; }
  out.innerHTML = '<span class="muted">追加中…</span>';
  try {
    var r = await fetch('/api/hq/company', {
      method:'POST', credentials:'include', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({name:name, email:email, rc_member_id:rc||null, role:role, mode:mode, password:pw||null})
    }).then(async res=>{ if(!res.ok) throw new Error((await res.json().catch(()=>({}))).detail||res.status); return res.json(); });

    var msg = '✅ 「'+esc(name)+'」を追加しました。';
    if (r.member.reused) msg += '（既存のメールを流用）';
    msg += mode==='invite' ? ' 招待メールを '+esc(email)+' に送信しました。'
                           : ' パスワードを設定しました。担当者へ安全にお渡しください。';
    out.innerHTML = '<div class="success">'+msg+'</div>';
    ['f_name','f_email','f_rc','f_pw'].forEach(function(id){ document.getElementById(id).value=''; });
    load();   // 一覧を更新
  } catch(e) {
    out.innerHTML = '<div class="warn">追加に失敗しました：'+esc(e.message)+'</div>';
  }
}

load();
</script>
</body>
</html>
