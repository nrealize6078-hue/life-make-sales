<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LMP本部コンソール</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
         background: #f5f7fb; color: #1f2d45; padding: clamp(16px, 4vw, 40px); }
  .wrap { max-width: 1100px; margin: 0 auto; }
  h1 { font-size: clamp(20px, 3vw, 28px); color: #0e2245; letter-spacing: .02em; }
  .sub { color: #5b6b82; font-size: 13.5px; margin-top: 4px; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin: 22px 0; }
  .card { background: #fff; border: 1px solid rgba(14,34,69,.08); border-radius: 14px; padding: 18px 20px;
          box-shadow: 0 10px 26px -20px rgba(14,34,69,.4); }
  .card .n { font-size: 30px; font-weight: 700; color: #0e2245; }
  .card .l { font-size: 12.5px; color: #5b6b82; margin-top: 3px; }
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 14px; overflow: hidden;
          box-shadow: 0 10px 26px -20px rgba(14,34,69,.4); }
  th, td { text-align: left; padding: 12px 14px; font-size: 13.5px; border-bottom: 1px solid rgba(14,34,69,.06); }
  th { background: #0e2245; color: #fff; font-weight: 600; letter-spacing: .02em; }
  tr:last-child td { border-bottom: 0; }
  .muted { color: #8493a8; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 999px; background: #eef2fb; color: #2e5be6; }
  .warn { background: #2a1215; color: #ff8a80; padding: 14px 16px; border-radius: 10px; font-size: 13.5px; line-height: 1.7; }
  .members { font-size: 12.5px; color: #5b6b82; }
  .members div { padding: 2px 0; }
  .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  button { font-family: inherit; font-size: 13px; padding: 9px 16px; border-radius: 10px; border: 0; cursor: pointer;
           background: #0e2245; color: #fff; }
  button.ghost { background: #eef2fb; color: #0e2245; }
  a.back { color: #2e5be6; text-decoration: none; font-size: 13px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div>
      <h1>LMP本部コンソール</h1>
      <div class="sub">全加盟店の利用状況（読み取り専用・第1版）</div>
    </div>
    <div>
      <a class="back" href="/">← SALESへ戻る</a>
      <button class="ghost" onclick="load()">更新</button>
    </div>
  </div>

  <div id="status"></div>
  <div class="cards" id="cards"></div>
  <div id="body"></div>
</div>

<script>
function esc(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(s){ if(!s) return '—'; try { return new Date(s).toLocaleString('ja-JP', {year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}); } catch(e){ return s; } }

async function load(){
  var body = document.getElementById('body');
  var cards = document.getElementById('cards');
  var status = document.getElementById('status');
  body.innerHTML = '<p class="muted">読み込み中…</p>'; cards.innerHTML=''; status.innerHTML='';

  // 設定チェック
  try {
    var st = await fetch('/api/hq/status', {credentials:'include'}).then(r=>r.json());
    if (!st.configured) {
      status.innerHTML = '<div class="warn">Supabaseが未設定です。VPSの <code>/opt/life-make-sales/.env</code> に '
        + '<code>SUPABASE_URL</code> と <code>SUPABASE_SERVICE_ROLE_KEY</code> を設定し、<code>systemctl restart lms</code> してください。</div>';
      body.innerHTML=''; return;
    }
  } catch(e) {
    status.innerHTML = '<div class="warn">権限がありません。本部(hq)アカウントでログインしてください。</div>';
    body.innerHTML=''; return;
  }

  try {
    var d = await fetch('/api/hq/overview', {credentials:'include'}).then(async r=>{
      if(!r.ok) throw new Error((await r.json().catch(()=>({}))).detail || r.status);
      return r.json();
    });

    cards.innerHTML =
      card(d.tenant_count, '加盟企業') +
      card(d.user_count, '利用者') +
      card(d.auth_user_count, '認証済みユーザー') +
      card(d.hq_count, '本部ユーザー');

    if (!d.tenants.length) { body.innerHTML = '<p class="muted">加盟店がまだありません。</p>'; return; }

    var rows = d.tenants.map(function(t){
      var members = t.members.map(function(m){
        var conf = m.confirmed ? '' : ' <span class="badge">未確認</span>';
        return '<div>'+esc(m.email||'—')+' <span class="muted">('+esc(m.role)+')</span>'+conf+'</div>';
      }).join('');
      return '<tr>'
        + '<td><strong>'+esc(t.name)+'</strong><div class="muted" style="font-size:11.5px">'+esc(t.rc_member_id||'RC会員ID未設定')+'</div></td>'
        + '<td>'+t.member_count+'</td>'
        + '<td>'+fmtDate(t.last_login)+'</td>'
        + '<td class="members">'+(members||'<span class="muted">—</span>')+'</td>'
        + '</tr>';
    }).join('');

    body.innerHTML = '<table><thead><tr><th>加盟企業</th><th>人数</th><th>最終ログイン</th><th>メンバー</th></tr></thead><tbody>'+rows+'</tbody></table>';
  } catch(e) {
    body.innerHTML = '<div class="warn">読み込みに失敗しました：'+esc(e.message)+'</div>';
  }
}
function card(n, l){ return '<div class="card"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>'; }
load();
</script>
</body>
</html>
