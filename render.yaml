# Render.com 用デプロイ定義(ライフメイクセールス)
services:
  - type: web
    name: life-make-sales
    runtime: docker
    plan: starter            # SQLite永続には Disk が要るため starter 以上
    healthCheckPath: /api/ai/health
    envVars:
      - key: APP_PASSWORD     # ★必須:ログインパスワード(ダッシュボードで入力)
        sync: false
      - key: DEMO_MODE
        value: "true"         # 本番AIを使うなら false にしてキーを入れる
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ASSEMBLYAI_API_KEY
        sync: false
      - key: DATABASE_PATH
        value: /data/sales_tool.db
      - key: UPLOAD_DIR
        value: /data/uploads
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
